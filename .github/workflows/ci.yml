name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install numpy==1.23.5 Cython
          pip install --no-build-isolation madmom==0.16.1
          pip install -r requirements.txt -r requirements-ml.txt pytest mir-eval soundfile
      - name: Verify madmom import
        run: python -c "import collections, collections.abc; collections.MutableSequence = getattr(collections, 'MutableSequence', collections.abc.MutableSequence); import madmom"
      - name: Run unit tests
        run: python -m pytest tests/ -q --ignore=tests/fixtures
        env:
          CHORD_ENGINE: ml
          CHORD_ENGINE_STRICT: "1"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
