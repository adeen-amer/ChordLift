name: Chord eval

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-ml.txt pytest mir-eval soundfile
      - name: Run unit tests
        run: python -m pytest tests/ -q --ignore=tests/fixtures
        env:
          CHORD_ENGINE: ml
          CHORD_ENGINE_STRICT: "1"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: [unit-tests, frontend]
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-ml.txt soundfile

      - name: Download eval audio
        run: python scripts/download_eval_tracks.py
        env:
          CHORD_ENGINE: ml
          CHORD_ML_MODEL: chordia

      - name: Gold v2 DEV — mir_eval vs v49 baseline
        run: python eval_gold_mir.py --no-cache --split dev --require-audio-identity --check-baseline
        env:
          CHORD_ENGINE: ml
          CHORD_ML_MODEL: chordia
          CHORD_ENGINE_STRICT: "1"

      - name: Gold v2 TEST — mir_eval vs v49 baseline
        run: python eval_gold_mir.py --no-cache --split test --require-audio-identity --check-baseline
        env:
          CHORD_ENGINE: ml
          CHORD_ML_MODEL: chordia
          CHORD_ENGINE_STRICT: "1"
