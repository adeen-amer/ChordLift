services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000,http://localhost}
      CHORD_ENGINE: ${CHORD_ENGINE:-ml}
      CHORD_ML_MODEL: ${CHORD_ML_MODEL:-chordia}
      PORT: 8000
    volumes:
      - backend-cache:/app/cache
      - backend-downloads:/app/downloads
      - backend-uploads:/app/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 4G
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: ""
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  backend-cache:
  backend-downloads:
  backend-uploads:
